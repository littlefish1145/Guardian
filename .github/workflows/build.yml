name: Build Multi-Platform Binaries

on:
  push:
    branches: [main, master]
    tags:
      - '*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build - ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            binary_name: guardian-linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            binary_name: guardian-linux-arm64
          - os: linux
            arch: arm
            runner: ubuntu-latest
            binary_name: guardian-linux-arm
            goarch: arm
            goarm: 7
          # Windows builds
          - os: windows
            arch: amd64
            runner: windows-latest
            binary_name: guardian-windows-amd64.exe
          - os: windows
            arch: arm64
            runner: windows-latest
            binary_name: guardian-windows-arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build for Linux
        if: matrix.os == 'linux'
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.goarch || matrix.arch }}${{ matrix.goarm && format(' GOARM={0}', matrix.goarm) || '' }} go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.binary_name }} ./cmd/guardian
        shell: bash

      - name: Build for Windows
        if: matrix.os == 'windows'
        run: |
          $env:CGO_ENABLED = "0"
          $env:GOOS = "${{ matrix.os }}"
          $env:GOARCH = "${{ matrix.arch }}"
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.binary_name }} ./cmd/guardian
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            if [ -d "$dir" ]; then
              cd "$dir"
              for file in *; do
                if [ -f "$file" ]; then
                  zip "../${file}.zip" "$file"
                fi
              done
              cd ..
            fi
          done
          ls -la *.zip || echo "No zip files found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
